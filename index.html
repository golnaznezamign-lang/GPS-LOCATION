<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Sender</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- proj4 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        direction: rtl;
    }

    #map {
        width: 100%;
        height: calc(100svh - 70px); /* نسخه نهایی مخصوص آیفون */
    }

    #bottomBar {
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        background: #fff;
        border-top: 1px solid #ccc;
        font-size: 15px;
    }

    #sendBtn {
        background: #0066ff;
        color: white;
        padding: 10px 18px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
    }

    #utmText {
        text-align: left;
        direction: ltr;
        font-size: 15px;
    }
</style>
</head>

<body>

<div id="map"></div>

<div id="bottomBar">
    <button id="sendBtn">ارسال موقعیت</button>
    <div id="utmText">Zone 39N     X: ---     Y: ---</div>
</div>

<script>
    // تعریف UTM Zone 39N
    proj4.defs("EPSG:32639","+proj=utm +zone=39 +datum=WGS84 +units=m +no_defs");

    // ایجاد نقشه بدون مرکز اولیه
    var map = L.map('map');

    // لایه OSM
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // مارکر و دایره (ابتدا در مرکز)
    var marker = L.marker(map.getCenter()).addTo(map);
    var accuracyCircle = L.circle(map.getCenter(), {
        radius: 20,
        color: "blue",
        fillColor: "blue",
        fillOpacity: 0.15
    }).addTo(map);

    // برای زوم اولیه فقط یک بار
    var firstFix = true;

    // تابع آپدیت UTM بر اساس GPS واقعی
    function updateUTMFromGPS(lat, lng) {
        var utm = proj4("EPSG:4326", "EPSG:32639", [lng, lat]);
        document.getElementById("utmText").textContent =
            "Zone 39N     X: " + Math.round(utm[0]) + "     Y: " + Math.round(utm[1]);
    }

    // گرفتن موقعیت واقعی کاربر
    map.setView([35.7, 51.4], 15);   // یک مرکز اولیه موقت

    map.locate({ watch: true });

    // وقتی GPS پیدا شد
    map.on('locationfound', function(e) {
        marker.setLatLng(e.latlng);
        accuracyCircle.setLatLng(e.latlng);
        accuracyCircle.setRadius(e.accuracy);

        // زوم اولیه فقط یک بار
        if (firstFix) {
            map.setView(e.latlng, 17);
            firstFix = false;
        }

        // حرکت دائمی نقشه همراه GPS
        map.setView(e.latlng, 17);

        updateUTMFromGPS(e.latlng.lat, e.latlng.lng);
    });

    // دکمه ارسال موقعیت با Share API
    document.getElementById("sendBtn").addEventListener("click", async function() {
        var pos = marker.getLatLng();
        var text = `موقعیت من:\nLatitude: ${pos.lat}\nLongitude: ${pos.lng}`;
        var url = `https://maps.google.com/?q=${pos.lat},${pos.lng}`;

        if (navigator.share) {
            try {
                await navigator.share({
                    title: "ارسال موقعیت",
                    text: text,
                    url: url
                });
            } catch (err) {
                console.log("Share canceled");
            }
        } else {
            alert("مرورگر شما از اشتراک‌گذاری پشتیبانی نمی‌کند.");
        }
    });
</script>

</body>
</html>
