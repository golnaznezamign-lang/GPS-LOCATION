<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Sender</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- proj4 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        direction: rtl;
    }

    #map {
        width: 100%;
        height: calc(100svh - 70px);
    }

    #bottomBar {
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        background: #fff;
        border-top: 1px solid #ccc;
        font-size: 15px;
    }

    #sendBtn {
        background: #0066ff;
        color: white;
        padding: 10px 18px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
    }

    #utmText {
        text-align: left;
        direction: ltr;
        font-size: 15px;
    }
</style>
</head>

<body>

<div id="map"></div>

<div id="bottomBar">
 <button id="sendBtn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.02-4.11c.54.5 1.25.81 2.07.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 
        1.34-3 3c0 .24.04.47.09.7L8.91 9.81C8.38 9.31 7.67 9 6.85 9c-1.66 0-3 
        1.34-3 3s1.34 3 3 3c.82 0 1.53-.31 2.07-.81l7.12 4.17c-.05.21-.09.43-.09.65 
        0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.93-2.92-2.93z"/>
    </svg>
</button>

    <div id="utmText">Zone --     X: ---     Y: ---</div>
</div>

<script>

    // ایجاد نقشه بدون مرکز اولیه
    var map = L.map('map');

    // لایه OSM
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    var marker = null;
    var accuracyCircle = null;
    var firstFix = true;

    // تابع محاسبه UTM واقعی
    function updateUTMFromGPS(lat, lng) {

        // محاسبه زون
        var zone = Math.floor((lng + 180) / 6) + 1;

        // انتخاب EPSG بر اساس نیمکره
        var epsg = lat >= 0 ? `EPSG:326${zone}` : `EPSG:327${zone}`;

        // تعریف پروجکشن اگر قبلاً تعریف نشده
        if (!proj4.defs[epsg]) {
            proj4.defs(epsg, `+proj=utm +zone=${zone} +datum=WGS84 +units=m +no_defs`);
        }

        // تبدیل مختصات
        var utm = proj4("EPSG:4326", epsg, [lng, lat]);

        // نمایش
        document.getElementById("utmText").textContent =
            `Zone ${zone}${lat >= 0 ? "N" : "S"}     X: ${Math.round(utm[0])}     Y: ${Math.round(utm[1])}`;
    }

    // گرفتن موقعیت واقعی
    map.locate({ watch: true, enableHighAccuracy: true });

    // وقتی GPS پیدا شد
    map.on('locationfound', function(e) {

        // ساخت مارکر و دایره فقط بار اول
        if (!marker) {
            marker = L.marker(e.latlng).addTo(map);

            accuracyCircle = L.circle(e.latlng, {
                radius: e.accuracy,
                color: "blue",
                fillColor: "blue",
                fillOpacity: 0.15
            }).addTo(map);
        } else {
            marker.setLatLng(e.latlng);
            accuracyCircle.setLatLng(e.latlng);
            accuracyCircle.setRadius(e.accuracy);
        }

        // زوم اولیه فقط یک بار
        if (firstFix) {
            map.setView(e.latlng, 17);
            firstFix = false;
        }

        updateUTMFromGPS(e.latlng.lat, e.latlng.lng);
    });

    // دکمه ارسال موقعیت
    document.getElementById("sendBtn").addEventListener("click", async function() {
        if (!marker) return;

        var pos = marker.getLatLng();
        var text = `موقعیت من:\nLatitude: ${pos.lat}\nLongitude: ${pos.lng}`;
        var url = `https://maps.google.com/?q=${pos.lat},${pos.lng}`;

        if (navigator.share) {
            try {
                await navigator.share({
                    title: "ارسال موقعیت",
                    text: text,
                    url: url
                });
            } catch (err) {
                console.log("Share canceled");
            }
        } else {
            alert("مرورگر شما از اشتراک‌گذاری پشتیبانی نمی‌کند.");
        }
    });

</script>

</body>
</html>
