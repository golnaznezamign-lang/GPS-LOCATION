<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Sender</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- proj4 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        direction: rtl;
    }

    #map {
        width: 100%;
        height: calc(100vh - 70px);
    }

    #bottomBar {
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        background: #fff;
        border-top: 1px solid #ccc;
        font-size: 15px;
    }

    #sendBtn {
        background: #0066ff;
        color: white;
        padding: 10px 18px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
    }

    #utmText {
        text-align: left;
        direction: ltr;
        font-size: 15px;
    }
</style>
</head>

<body>

<div id="map"></div>

<div id="bottomBar">
    <button id="sendBtn">ارسال موقعیت</button>
    <div id="utmText">Zone 39N     X: ---     Y: ---</div>
</div>

<script>
    // تعریف UTM Zone 39N
    proj4.defs("EPSG:32639","+proj=utm +zone=39 +datum=WGS84 +units=m +no_defs");

    // ایجاد نقشه
    var map = L.map('map').setView([35.6892, 51.3890], 15);

    // لایه OSM
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // مارکر
    var marker = L.marker(map.getCenter()).addTo(map);

    // دایره دقت
    var accuracyCircle = L.circle(map.getCenter(), {
        radius: 20,
        color: "blue",
        fillColor: "blue",
        fillOpacity: 0.15
    }).addTo(map);

    // تابع آپدیت UTM
    function updateUTM() {
        var c = map.getCenter();
        marker.setLatLng(c);
        accuracyCircle.setLatLng(c);

        var utm = proj4("EPSG:4326", "EPSG:32639", [c.lng, c.lat]);

        document.getElementById("utmText").textContent =
            "Zone 39N     X: " + Math.round(utm[0]) + "     Y: " + Math.round(utm[1]);
    }

    // آپدیت زنده
    map.on('move', updateUTM);

    // گرفتن موقعیت واقعی کاربر
    map.locate({ setView: true, maxZoom: 17 });

    map.on('locationfound', function(e) {
        marker.setLatLng(e.latlng);
        accuracyCircle.setLatLng(e.latlng);
        map.setView(e.latlng, 17);
        updateUTM();
    });

    // اولین بار
    updateUTM();

    // دکمه ارسال موقعیت
    document.getElementById("sendBtn").addEventListener("click", function() {
        var c = map.getCenter();
        alert("مختصات شما ارسال شد:\n\nLat: " + c.lat + "\nLng: " + c.lng);
    });
</script>

</body>
</html>
